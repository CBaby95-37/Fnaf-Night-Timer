<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Shift Timer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #151515;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(255,255,255,0.05);
            border: 1px solid #333;
        }

        h1 {
            color: #888;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        #clock {
            font-size: 6rem;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* The winning 6AM glow */
        .win {
            color: #ffeb3b;
            text-shadow: 0 0 20px rgba(255, 235, 59, 0.8), 0 0 40px rgba(255, 235, 59, 0.5) !important;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background-color: #222;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            transition: width 0.1s linear;
        }

        .controls button {
            background-color: #222;
            color: white;
            border: 1px solid #555;
            padding: 10px 20px;
            margin: 0 5px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .controls button:hover {
            background-color: #444;
            border-color: #888;
        }

        .controls button:active {
            background-color: #111;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Night Shift</h1>
        <div id="clock">12:00 AM</div>
        
        <div class="progress-bar-container">
            <div id="progress"></div>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startTimer()">Start</button>
            <button id="pauseBtn" onclick="pauseTimer()">Pause</button>
            <button id="resetBtn" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <script>
        // 8 minutes total real time (8 * 60 * 1000 milliseconds)
        const TOTAL_MS = 8 * 60 * 1000; 
        
        let startTime = null;
        let accumulatedTime = 0;
        let isRunning = false;
        let animationFrameId;

        const clockEl = document.getElementById('clock');
        const progressEl = document.getElementById('progress');

        function updateDisplay() {
            let now = Date.now();
            let timePassed = accumulatedTime + (isRunning ? (now - startTime) : 0);

            // Cap the time at 8 minutes
            if (timePassed >= TOTAL_MS) {
                timePassed = TOTAL_MS;
                isRunning = false;
                clockEl.classList.add('win');
                clockEl.innerText = "6:00 AM";
                progressEl.style.width = "100%";
                cancelAnimationFrame(animationFrameId);
                return;
            }

            // Calculate progress fraction (0.0 to 1.0)
            let fraction = timePassed / TOTAL_MS;

            // 12AM to 6AM is 6 hours = 360 in-game minutes
            let gameMinutesPassed = Math.floor(fraction * 360);

            let hour = Math.floor(gameMinutesPassed / 60);
            let minute = gameMinutesPassed % 60;

            // Format hours (0 hours passed = 12 AM)
            let displayHour = hour === 0 ? 12 : hour;
            // Format minutes to always have two digits (e.g., 05)
            let displayMinute = minute < 10 ? '0' + minute : minute;

            clockEl.innerText = `${displayHour}:${displayMinute} AM`;
            progressEl.style.width = `${fraction * 100}%`;

            if (isRunning) {
                animationFrameId = requestAnimationFrame(updateDisplay);
            }
        }

        function startTimer() {
            if (!isRunning) {
                // Remove win effects if restarting from finish
                if (accumulatedTime >= TOTAL_MS) {
                    resetTimer();
                }
                
                clockEl.classList.remove('win');
                isRunning = true;
                startTime = Date.now();
                animationFrameId = requestAnimationFrame(updateDisplay);
            }
        }

        function pauseTimer() {
            if (isRunning) {
                isRunning = false;
                accumulatedTime += Date.now() - startTime;
                cancelAnimationFrame(animationFrameId);
            }
        }

        function resetTimer() {
            isRunning = false;
            accumulatedTime = 0;
            startTime = null;
            cancelAnimationFrame(animationFrameId);
            clockEl.classList.remove('win');
            
            // Reset visuals manually
            clockEl.innerText = "12:00 AM";
            progressEl.style.width = "0%";
        }
    </script>

</body>
</html>
